<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频预览</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #111;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: sans-serif;
            color: #fff;
            padding: 16px;
        }
        video {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 10px;
            box-shadow: 0 6px 30px rgba(0,0,0,0.7);
        }
        #title {
            margin-bottom: 14px;
            font-size: 15px;
            color: #aaa;
            word-break: break-all;
            text-align: center;
        }
        #error {
            display: none;
            text-align: center;
            padding: 32px;
        }
        #error h2 { font-size: 20px; margin-bottom: 10px; color: #f55; }
        #error p  { font-size: 14px; color: #aaa; }
    </style>
</head>
<body>

    <div id="title"></div>
    <video id="mainVideo" controls playsinline></video>

    <div id="error">
        <h2>⚠️ 视频未找到</h2>
        <p id="errorMsg">请检查 URL 参数 <code>?v=文件名.mp4</code> 是否正确。</p>
    </div>

    <script>
        const BASE = "https://kunb-fighting.github.io/textbook_3D_materials/";

        const params    = new URLSearchParams(window.location.search);
        const videoFile = params.get("v");
        const video     = document.getElementById("mainVideo");
        const errorBox  = document.getElementById("error");
        const errorMsg  = document.getElementById("errorMsg");
        const titleEl   = document.getElementById("title");

        if (!videoFile) {
            video.style.display = "none";
            errorMsg.textContent = "URL 中缺少参数，用法：player.html?v=文件名.mp4";
            errorBox.style.display = "block";
        } else {
            const src = BASE + encodeURIComponent(videoFile);
            titleEl.textContent = videoFile;
            video.src = src;
            video.load();

            video.onerror = () => {
                video.style.display = "none";
                errorMsg.innerHTML = `无法加载：<br><code>${src}</code><br><br>请确认文件名拼写正确，且仓库为 Public。`;
                errorBox.style.display = "block";
            };
        }
    </script>
</body>
</html>
